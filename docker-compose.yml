# docker-compose.yml — html-site 部署示例
#
# 使用：
#   1. 复制本文件按需修改环境变量（尤其 HTML_SITE_URL）
#   2. docker compose pull && docker compose up -d
#   3. 首次启动后进容器创建管理员：
#        docker compose exec html-site /app/html-site user add --password <密码> admin
#
# 数据持久化：./data 目录挂载到容器 /app/data，删容器不丢数据。

services:
  html-site:
    # 直接拉取 GitHub Container Registry 上的预构建镜像，无需本地 build。
    # 镜像由 .github/workflows/release.yml 在打 tag 时自动发布。
    image: ghcr.io/zaizyp/html-site:latest
    # 若需从本地源码自行构建（例如改了代码未发布），取消注释下一行：
    # build: .
    container_name: html-site
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 监听地址（容器内默认 :8080，无需改）
      HTML_SITE_ADDR: ":8080"
      # 数据目录（容器内默认 /app/data，无需改）
      HTML_SITE_DATA: "/app/data"
      # ★ 必填：对外可访问的基础 URL，用于拼接访问链接。
      #   生产环境填你的实际域名（建议前面套 nginx/caddy 走 HTTPS）。
      HTML_SITE_URL: "http://localhost:8080"
      # 可选：时区
      TZ: "Asia/Shanghai"
    volumes:
      # 数据持久化（SQLite + HTML 文件）
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
